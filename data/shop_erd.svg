<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
<style>
  .bg { fill: #07131f; }
  .entity { fill: #081523; stroke: #5d7394; stroke-width: 2.5; }
  .header { fill: #284a56; }
  .divider { stroke: #c8dcff; stroke-width: 2; }
  .title { fill: #f3f6fb; font: 700 20px Arial; text-anchor: middle; dominant-baseline: middle; }
  .attr { fill: #d8e1ee; font: 14px Arial; }
  .conn { fill: none; stroke: #cfe0ff; stroke-width: 3; }
  .label { fill: #79ddd7; font: 700 14px Arial; text-anchor: middle;
           paint-order: stroke; stroke: #07131f; stroke-width: 8; }
  .card { fill: #f0c85b; font: 700 14px Arial; text-anchor: middle;
          dominant-baseline: middle;
          paint-order: stroke; stroke: #07131f; stroke-width: 7; }
</style>

<rect class="bg" width="1100" height="520"/>

<!-- Kunde -->
<rect class="entity" x="60" y="60" rx="20" ry="20" width="240" height="150"/>
<rect class="header" x="60" y="60" width="240" height="44" rx="20"/>
<line class="divider" x1="60" y1="104" x2="300" y2="104"/>
<text class="title" x="180" y="82">Kunde</text>
<text class="attr" x="80" y="130">PK kunde_id</text>
<text class="attr" x="80" y="154">vorname</text>
<text class="attr" x="80" y="178">nachname</text>
<text class="attr" x="80" y="202">ort</text>

<!-- Bestellung -->
<rect class="entity" x="420" y="60" rx="20" ry="20" width="260" height="130"/>
<rect class="header" x="420" y="60" width="260" height="44" rx="20"/>
<line class="divider" x1="420" y1="104" x2="680" y2="104"/>
<text class="title" x="550" y="82">Bestellung</text>
<text class="attr" x="440" y="130">PK bestellung_id</text>
<text class="attr" x="440" y="154">bestelldatum</text>
<text class="attr" x="440" y="178">FK kunde_id</text>

<!-- Produkt -->
<rect class="entity" x="800" y="60" rx="20" ry="20" width="240" height="130"/>
<rect class="header" x="800" y="60" width="240" height="44" rx="20"/>
<line class="divider" x1="800" y1="104" x2="1040" y2="104"/>
<text class="title" x="920" y="82">Produkt</text>
<text class="attr" x="820" y="130">PK produkt_id</text>
<text class="attr" x="820" y="154">name</text>
<text class="attr" x="820" y="178">preis</text>

<!-- Bestellposition -->
<rect class="entity" x="420" y="270" rx="20" ry="20" width="260" height="150"/>
<rect class="header" x="420" y="270" width="260" height="44" rx="20"/>
<line class="divider" x1="420" y1="314" x2="680" y2="314"/>
<text class="title" x="550" y="292">Bestellposition</text>
<text class="attr" x="440" y="340">PK position_id</text>
<text class="attr" x="440" y="364">FK bestellung_id</text>
<text class="attr" x="440" y="388">FK produkt_id</text>
<text class="attr" x="440" y="412">menge</text>

<!-- Kunde -> Bestellung -->
<path class="conn" d="M 300 135 L 420 125"/>
<text class="card" x="330" y="135">1</text>
<text class="card" x="390" y="125">n</text>
<text class="label" x="360" y="105">gibt auf</text>

<!-- Bestellung -> Bestellposition (FIXED) -->
<path class="conn" d="M 550 190 L 550 270"/>
<text class="card" x="565" y="210">1</text>
<text class="card" x="565" y="250">n</text>
<!-- TEXT SEITLICH -->
<text class="label" x="610" y="230">enthält</text>

<!-- Produkt -> Bestellposition -->
<path class="conn" d="M 800 125 L 700 350"/>
<text class="card" x="770" y="125">1</text>
<text class="card" x="710" y="350">n</text>
<text class="label" x="760" y="240">steht in</text>

</svg>
