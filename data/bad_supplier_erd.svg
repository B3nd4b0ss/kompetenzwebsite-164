<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-label="Fehlerhaftes ERD eines Lieferantenmodells">
<style>
  .bg { fill: #07131f; }
  .grid line { stroke: rgba(255,255,255,0.04); stroke-width: 1; }
  .entity { fill: #081523; stroke: #5d7394; stroke-width: 2.5; }
  .header-bad { fill: #6b2b38; }
  .divider { stroke: #c8dcff; stroke-width: 2; }
  .title { fill: #f3f6fb; font: 700 20px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
  .attr { fill: #d8e1ee; font: 14px Arial, sans-serif; }
  .attr-bad { fill: #ffb2b2; font: 14px Arial, sans-serif; }
  .conn { fill: none; stroke: #ffd0a8; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  .label { fill: #ffd27a; font: 700 14px Arial, sans-serif; text-anchor: middle; paint-order: stroke; stroke: #07131f; stroke-width: 8; stroke-linejoin: round; }
  .card { fill: #ff8a8a; font: 700 14px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; paint-order: stroke; stroke: #07131f; stroke-width: 7; stroke-linejoin: round; }
</style>
<rect class="bg" x="0" y="0" width="1120" height="420"/>
<g class="grid">
  <line x1="0" y1="0" x2="1120" y2="0"/><line x1="0" y1="40" x2="1120" y2="40"/><line x1="0" y1="80" x2="1120" y2="80"/>
  <line x1="0" y1="120" x2="1120" y2="120"/><line x1="0" y1="160" x2="1120" y2="160"/><line x1="0" y1="200" x2="1120" y2="200"/>
  <line x1="0" y1="240" x2="1120" y2="240"/><line x1="0" y1="280" x2="1120" y2="280"/><line x1="0" y1="320" x2="1120" y2="320"/>
  <line x1="0" y1="360" x2="1120" y2="360"/><line x1="0" y1="400" x2="1120" y2="400"/>
  <line x1="0" y1="0" x2="0" y2="420"/><line x1="40" y1="0" x2="40" y2="420"/><line x1="80" y1="0" x2="80" y2="420"/>
  <line x1="120" y1="0" x2="120" y2="420"/><line x1="160" y1="0" x2="160" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
  <line x1="240" y1="0" x2="240" y2="420"/><line x1="280" y1="0" x2="280" y2="420"/><line x1="320" y1="0" x2="320" y2="420"/>
  <line x1="360" y1="0" x2="360" y2="420"/><line x1="400" y1="0" x2="400" y2="420"/><line x1="440" y1="0" x2="440" y2="420"/>
  <line x1="480" y1="0" x2="480" y2="420"/><line x1="520" y1="0" x2="520" y2="420"/><line x1="560" y1="0" x2="560" y2="420"/>
  <line x1="600" y1="0" x2="600" y2="420"/><line x1="640" y1="0" x2="640" y2="420"/><line x1="680" y1="0" x2="680" y2="420"/>
  <line x1="720" y1="0" x2="720" y2="420"/><line x1="760" y1="0" x2="760" y2="420"/><line x1="800" y1="0" x2="800" y2="420"/>
  <line x1="840" y1="0" x2="840" y2="420"/><line x1="880" y1="0" x2="880" y2="420"/><line x1="920" y1="0" x2="920" y2="420"/>
  <line x1="960" y1="0" x2="960" y2="420"/><line x1="1000" y1="0" x2="1000" y2="420"/><line x1="1040" y1="0" x2="1040" y2="420"/>
  <line x1="1080" y1="0" x2="1080" y2="420"/>
</g>

<g>
  <rect class="entity" x="60" y="60" rx="20" ry="20" width="400" height="250"/>
  <path class="header-bad" d="M 80 60 H 440 Q 460 60 460 80 V 104 H 60 V 80 Q 60 60 80 60 Z"/>
  <line class="divider" x1="60" y1="104" x2="460" y2="104"/>
  <text class="title" x="260" y="82">Lieferant</text>
  <text class="attr" x="82" y="132">PK lieferant_id</text>
  <text class="attr" x="82" y="156">name</text>
  <text class="attr-bad" x="82" y="184">kontakt1_name</text>
  <text class="attr-bad" x="82" y="208">kontakt1_mail</text>
  <text class="attr-bad" x="82" y="232">kontakt2_name</text>
  <text class="attr-bad" x="82" y="256">kontakt2_mail</text>
  <text class="attr-bad" x="82" y="280">bestellung_ids</text>
</g>

<g>
  <rect class="entity" x="700" y="100" rx="20" ry="20" width="280" height="130"/>
  <path class="header-bad" d="M 720 100 H 960 Q 980 100 980 120 V 144 H 700 V 120 Q 700 100 720 100 Z"/>
  <line class="divider" x1="700" y1="144" x2="980" y2="144"/>
  <text class="title" x="840" y="122">Bestellung</text>
  <text class="attr" x="722" y="172">PK bestellung_id</text>
  <text class="attr" x="722" y="196">datum</text>
  <text class="attr" x="722" y="220">betrag</text>
</g>

<g>
  <path class="conn" d="M 460 206 L 580 206 L 580 165 L 700 165"/>
  <text class="card" x="500" y="206">?</text>
  <text class="card" x="660" y="165">?</text>
  <text class="label" x="580" y="148">als Textliste gespeichert</text>
</g>
</svg>
